<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ইসলামিক পোর্টাল - কুরআন ও হাদিস</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a5276;
            --secondary-color: #1e8449;
            --light-bg: #f0f4f7;
        }
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--light-bg);
            margin: 0; padding: 0;
        }
        header {
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            padding: 30px 10px;
        }
        .container {
            max-width: 700px;
            margin: -30px auto 40px;
            padding: 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .section { margin-bottom: 40px; text-align: center; }
        h2 { color: var(--primary-color); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        select, button {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            font-family: 'Hind Siliguri';
        }
        button {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #145a32; }

        audio { width: 100%; margin-top: 20px; border-radius: 30px; }
        
        #surah-name { color: var(--secondary-color); margin-top: 15px; font-size: 24px; }
        #status-msg { color: #888; font-size: 14px; margin-top: 5px; }

        #hadith-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            border-right: 5px solid var(--secondary-color);
            text-align: right; /* হাদিস সাধারণত ডান দিক থেকে পড়তে সুবিধা হয় তবে বাংলা বাম থেকে হবে */
            text-align: left;
            line-height: 1.8;
            min-height: 100px;
        }
    </style>
</head>
<body>

<header>
    <h1>আল-কুরআন ও হাদিস</h1>
    <p>সহজেই সূরা শুনুন এবং বাংলা হাদিস পড়ুন</p>
</header>

<div class="container">
    <!-- Quran Audio Section -->
    <div class="section">
        <h2>সূরা তিলাওয়াত</h2>
        <select id="surah-select" onchange="playSurah()">
            <option value="">লোডিং হচ্ছে...</option>
        </select>
        
        <div id="player-container">
            <h3 id="surah-name">সূরা নির্বাচন করুন</h3>
            <p id="status-msg">অডিও লোড হতে কয়েক সেকেন্ড সময় লাগতে পারে</p>
            <audio id="audio-player" controls>
                আপনার ব্রাউজার অডিও সাপোর্ট করে না।
            </audio>
        </div>
    </div>

    <!-- Hadith Section -->
    <div class="section">
        <h2>আজকের হাদিস (বুখারী শরীফ)</h2>
        <div id="hadith-box">
            নিচের বাটনে ক্লিক করে হাদিস পড়ুন...
        </div>
        <button onclick="getRandomHadith()">নতুন হাদিস লোড করুন</button>
    </div>
</div>

<script>
    const surahSelect = document.getElementById('surah-select');
    const audioPlayer = document.getElementById('audio-player');
    const surahNameDisplay = document.getElementById('surah-name');
    const statusMsg = document.getElementById('status-msg');

    // ১. সূরা তালিকা লোড করা
    async function loadSurahList() {
        try {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            surahSelect.innerHTML = '<option value="">-- সূরা বাছাই করুন --</option>';
            data.data.forEach(surah => {
                const option = document.createElement('option');
                option.value = surah.number;
                option.text = `${surah.number}. ${surah.englishName} - ${surah.name}`;
                surahSelect.appendChild(option);
            });
        } catch (err) {
            surahSelect.innerHTML = '<option>তালিকা লোড করা যায়নি</option>';
        }
    }

    // ২. অডিও প্লে করা (ফিক্সড লিঙ্ক)
    function playSurah() {
        const num = surahSelect.value;
        if (!num) return;

        const selectedText = surahSelect.options[surahSelect.selectedIndex].text;
        surahNameDisplay.innerText = selectedText;
        statusMsg.innerText = "অডিও বাফার হচ্ছে, দয়া করে অপেক্ষা করুন...";

        // ৩ ডিজিটের সংখ্যা তৈরি করা (যেমন: ১ হলে 001, ১০ হলে 010)
        const paddedNumber = num.toString().padStart(3, '0');
        
        // নির্ভরযোগ্য অডিও সার্ভার (Mishary Rashid Alafasy)
        const audioUrl = `https://server8.mp3quran.net/afs/${paddedNumber}.mp3`;
        
        audioPlayer.src = audioUrl;
        audioPlayer.load(); // নতুন সোর্স লোড করা
        
        // প্লে করার চেষ্টা করা
        const playPromise = audioPlayer.play();

        if (playPromise !== undefined) {
            playPromise.then(_ => {
                statusMsg.innerText = "এখন চলছে...";
            }).catch(error => {
                statusMsg.innerText = "অডিও প্লে করতে সমস্যা হয়েছে। আবার চেষ্টা করুন।";
                console.error("Playback error:", error);
            });
        }
    }

    // ৩. রেন্ডম হাদিস লোড করা
    async function getRandomHadith() {
        const hadithBox = document.getElementById('hadith-box');
        hadithBox.innerHTML = 'লোডিং...';
        try {
            const response = await fetch('https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/ben-bukhari.json');
            const data = await response.json();
            const randomNum = Math.floor(Math.random() * data.hadiths.length);
            const hadith = data.hadiths[randomNum];
            hadithBox.innerHTML = `<strong>হাদিস নং: ${hadith.hadithnumber}</strong><br><br>${hadith.text}`;
        } catch (e) {
            hadithBox.innerHTML = "হাদিস লোড করা সম্ভব হয়নি।";
        }
    }

    // শুরুতে লোড করা
    loadSurahList();
</script>

</body>
</html>
