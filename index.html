<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নূর-আল-কুরআন | পূর্ণাঙ্গ ইসলামিক পোর্টাল</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Lottie Animation Script -->
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --deep-green: #064e3b;
            --soft-bg: #f4f7f6;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--soft-bg);
            margin: 0; padding: 0;
            color: #333;
        }

        /* Background Animation */
        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15; pointer-events: none;
        }

        header {
            background: linear-gradient(135deg, var(--deep-green), #065f46);
            color: white; text-align: center;
            padding: 50px 20px; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* translation player */
        .card-box {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 30px;
            text-align: center; border-bottom: 4px solid var(--gold);
        }

        .surah-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
        }

        .surah-card {
            background: white; border-radius: 15px; padding: 25px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s; position: relative; overflow: hidden;
        }

        .surah-card:hover { transform: translateY(-8px); }

        .arabic-text { font-family: 'Amiri', serif; font-size: 2rem; color: var(--deep-green); }

        .btn-main {
            background: var(--gold); color: white; border: none;
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin: 10px 0; font-size: 16px; width: 100%;
        }

        .stats-row {
            display: flex; justify-content: space-between;
            font-size: 14px; margin-top: 15px; padding-top: 10px; border-top: 1px solid #eee;
        }

        .love-icon { cursor: pointer; color: #e11d48; font-size: 1.2rem; display: flex; align-items: center; gap: 5px; }

        /* Tasbih Section */
        .tasbih-box {
            background: var(--deep-green); color: white; border-radius: 20px;
            padding: 40px; text-align: center; margin-top: 40px;
        }

        #tasbih-display { font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold); }

        select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; max-width: 300px; font-size: 16px; }

        footer { background: #111; color: white; text-align: center; padding: 30px; margin-top: 50px; }

        /* Active playing animation */
        .playing { border: 2px solid var(--gold) !important; background: #fffdf5 !important; }
    </style>
</head>
<body>

    <!-- Background Lottie Animation -->
    <div class="bg-animation">
        <dotlottie-player src="https://lottie.host/9707246c-c689-4b6e-8271-e7370775d788/Y679k6rP8E.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
    </div>

    <header>
        <dotlottie-player src="https://lottie.host/8098670c-2646-455b-9f93-4a11b6d17730/6p79pE0A83.json" background="transparent" speed="1" style="width: 120px; height: 120px; margin: 0 auto;" loop autoplay></dotlottie-player>
        <h1>নূর-আল-কুরআন</h1>
        <p>ছোট সূরা তিলাওয়াত, বাংলা অর্থ ও গ্লোবাল জিকির প্ল্যাটফর্ম</p>
    </header>

    <div class="container">

        <!-- ১. অর্থসহ সূরা সেকশন -->
        <div class="card-box">
            <h2 style="color: var(--deep-green)">বাংলা অর্থসহ সূরা শুনুন</h2>
            <p>সিলেক্ট করুন (আরবির পর বাংলা অর্থ বাজবে)</p>
            <select id="select-bangla" onchange="playWithTranslation()">
                <option value="">-- সূরা বাছাই করুন --</option>
            </select>
            <div id="translation-status" style="margin-top:10px; font-weight:bold; color:var(--gold);"></div>
            <audio id="audio-bangla" controls style="width: 100%; margin-top: 20px;"></audio>
        </div>

        <!-- ২. ১৪টি ছোট সূরা গ্রিড -->
        <h2 style="text-align: center; color: var(--deep-green); margin: 40px 0;">নির্বাচিত ছোট সূরাসমূহ</h2>
        <div id="surah-list" class="surah-grid"></div>

        <!-- ৩. ডিজিটাল তসবিহ -->
        <div class="tasbih-box">
            <h2>ডিজিটাল তসবিহ কাউন্টার</h2>
            <div id="tasbih-display">0</div>
            <button class="btn-main" style="background: white; color: var(--deep-green); width: auto; padding: 15px 40px;" onclick="addTasbih()">আল্লাহু আকবার</button>
            <br>
            <button onclick="resetTasbih()" style="background:none; border:none; color:white; cursor:pointer; margin-top:15px; text-decoration:underline;">রিসেট কাউন্টার</button>
        </div>

        <!-- ৪. হাদিস সেকশন -->
        <div class="card-box" style="margin-top: 40px; border-left: 10px solid var(--deep-green);">
            <h3>আজকের হাদিস (বুখারী শরীফ)</h3>
            <p id="hadith-content" style="font-size: 18px; line-height: 1.8;">হাদিস লোড হচ্ছে...</p>
            <button class="btn-main" style="width: auto;" onclick="loadHadith()">নতুন হাদিস পড়ুন</button>
        </div>

    </div>

    <footer>
        <p>&copy; ২০২৪ নূর-আল-কুরআন | এটি একটি সাদাকায়ে জারিয়া প্রজেক্ট</p>
    </footer>

    <script>
        // --- Firebase Config (গ্লোবাল ডাটার জন্য) ---
        const firebaseConfig = { databaseURL: "https://islamic-web-demo-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // সূরার তথ্য
        const surahs = [
            { id: 1, name: "Al-Fatiha", ar: "الفاتحة" },
            { id: 93, name: "Ad-Duha", ar: "الضحى" },
            { id: 94, name: "Ash-Sharh", ar: "الشرح" },
            { id: 103, name: "Al-Asr", ar: "العصر" },
            { id: 105, name: "Al-Fil", ar: "الفيل" },
            { id: 106, name: "Quraish", ar: "قريش" },
            { id: 107, name: "Al-Ma'un", ar: "الماعون" },
            { id: 108, name: "Al-Kauthar", ar: "الكوثر" },
            { id: 109, name: "Al-Kafirun", ar: "الكافرون" },
            { id: 110, name: "An-Nasr", ar: "النصر" },
            { id: 111, name: "Al-Masad", ar: "المসদ" },
            { id: 112, name: "Al-Ikhlas", ar: "الإخلاص" },
            { id: 113, name: "Al-Falaq", ar: "الفلق" },
            { id: 114, name: "An-Nas", ar: "الناس" }
        ];

        let currentPlayingId = null;
        const gridAudio = new Audio();

        // ১. সূরা গ্রিড তৈরি
        function initApp() {
            const list = document.getElementById('surah-list');
            const select = document.getElementById('select-bangla');

            surahs.forEach(s => {
                // ড্রপডাউন অপশন
                let opt = document.createElement('option');
                opt.value = s.id;
                opt.text = s.name;
                select.appendChild(opt);

                // কার্ড তৈরি
                const card = document.createElement('div');
                card.className = 'surah-card';
                card.id = `card-${s.id}`;
                card.innerHTML = `
                    <div class="arabic-text">${s.ar}</div>
                    <h3>${s.name}</h3>
                    <button class="btn-main" id="btn-${s.id}" onclick="toggleSurah(${s.id})">▶ প্লে করুন</button>
                    <div class="stats-row">
                        <span>🎧 প্লে: <b id="p-${s.id}">0</b></span>
                        <div class="love-icon" onclick="sendLove(${s.id})">❤️ <b id="l-${s.id}">0</b></div>
                    </div>
                `;
                list.appendChild(card);

                // Firebase Realtime Listener
                db.ref('stats/' + s.id).on('value', snap => {
                    const data = snap.val() || { p: 0, l: 0 };
                    document.getElementById(`p-${s.id}`).innerText = data.p;
                    document.getElementById(`l-${s.id}`).innerText = data.l;
                });
            });
        }

        // ২. অডিও প্লে/পজ লজিক (Fix: Push handle)
        function toggleSurah(id) {
            if (currentPlayingId === id) {
                if (gridAudio.paused) {
                    gridAudio.play();
                    updateBtn(id, true);
                } else {
                    gridAudio.pause();
                    updateBtn(id, false);
                }
            } else {
                // নতুন সূরা প্লে
                if (currentPlayingId) updateBtn(currentPlayingId, false);
                
                currentPlayingId = id;
                const paddedId = id.toString().padStart(3, '0');
                gridAudio.src = `https://server8.mp3quran.net/afs/${paddedId}.mp3`;
                gridAudio.play();
                updateBtn(id, true);
                
                // গ্লোবাল কাউন্ট বাড়ানো
                db.ref('stats/' + id + '/p').transaction(c => (c || 0) + 1);
            }
        }

        function updateBtn(id, isPlaying) {
            const btn = document.getElementById(`btn-${id}`);
            const card = document.getElementById(`card-${id}`);
            if (isPlaying) {
                btn.innerText = "⏸ পজ করুন";
                card.classList.add('playing');
            } else {
                btn.innerText = "▶ প্লে করুন";
                card.classList.remove('playing');
            }
        }

        // ৩. অর্থসহ সূরা প্লেয়ার
        function playWithTranslation() {
            const id = document.getElementById('select-bangla').value;
            const player = document.getElementById('audio-bangla');
            const status = document.getElementById('translation-status');
            
            if(!id) return;
            gridAudio.pause(); // অন্য অডিও বন্ধ করা
            
            const paddedId = id.toString().padStart(3, '0');
            status.innerText = "লোড হচ্ছে...";
            player.src = `https://server13.mp3quran.net/bengali/${paddedId}.mp3`;
            player.play();
            player.onplay = () => status.innerText = "অনুবাদসহ বাজছে...";
        }

        // ৪. গ্লোবাল লাভ রিঅ্যাক্ট
        function sendLove(id) {
            db.ref('stats/' + id + '/l').transaction(c => (c || 0) + 1);
        }

        // ৫. তসবিহ ফাংশন
        let tCount = parseInt(localStorage.getItem('myTasbih')) || 0;
        document.getElementById('tasbih-display').innerText = tCount;

        function addTasbih() {
            tCount++;
            document.getElementById('tasbih-display').innerText = tCount;
            localStorage.setItem('myTasbih', tCount);
        }
        function resetTasbih() {
            tCount = 0;
            document.getElementById('tasbih-display').innerText = 0;
            localStorage.setItem('myTasbih', 0);
        }

        // ৬. হাদিস লোড
        async function loadHadith() {
            const hBox = document.getElementById('hadith-content');
            hBox.innerText = "সংগ্রহ করা হচ্ছে...";
            try {
                const res = await fetch('https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/ben-bukhari.json');
                const data = await res.json();
                const random = Math.floor(Math.random() * 300);
                hBox.innerText = data.hadiths[random].text;
            } catch (e) { hBox.innerText = "ইন্টারনেট সমস্যা। আবার চেষ্টা করুন।"; }
        }

        // Init
        window.onload = () => {
            initApp();
            loadHadith();
        };
    </script>
</body>
</html>
