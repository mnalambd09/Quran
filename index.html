<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নূর-আল-কুরআন | পূর্ণাঙ্গ ইসলামিক পোর্টাল</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Lottie Animation Script -->
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --deep-green: #064e3b;
            --soft-bg: #fdfbf7;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--soft-bg);
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png'), 
                              linear-gradient(135deg, #fdfbf7 0%, #f5e6ba 100%);
            margin: 0; padding: 0;
            color: #333;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.15; pointer-events: none;
        }

        header {
            background: linear-gradient(135deg, var(--deep-green), #065f46);
            color: white; text-align: center;
            padding: 50px 20px; clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .card-box {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 30px;
            text-align: center; border-bottom: 4px solid var(--gold);
        }

        .surah-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
        }

        .surah-card {
            background: white; border-radius: 15px; padding: 25px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .surah-card:hover { transform: translateY(-8px); }

        .arabic-text { font-family: 'Amiri', serif; font-size: 2rem; color: var(--deep-green); }

        .btn-main {
            background: var(--gold); color: white; border: none;
            padding: 12px 25px; border-radius: 50px; cursor: pointer;
            font-weight: bold; margin: 10px 0; font-size: 16px; width: 100%;
        }

        .tasbih-box {
            background: var(--deep-green); color: white; border-radius: 20px;
            padding: 40px; text-align: center; margin-top: 40px;
        }

        #tasbih-display { font-size: 4rem; font-weight: bold; margin: 20px 0; color: var(--gold); }

        select { 
            padding: 12px; border-radius: 8px; border: 2px solid var(--gold); 
            width: 100%; max-width: 400px; font-family: 'Hind Siliguri'; outline: none; 
            margin-bottom: 10px;
        }

        footer { background: #111; color: white; text-align: center; padding: 30px; margin-top: 50px; }

        .playing { border: 2.5px solid var(--gold) !important; background: #fffdf5 !important; }
    </style>
</head>
<body>

    <div class="bg-animation">
        <dotlottie-player src="https://lottie.host/9707246c-c689-4b6e-8271-e7370775d788/Y679k6rP8E.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
    </div>

    <header>
        <dotlottie-player src="https://lottie.host/8098670c-2646-455b-9f93-4a11b6d17730/6p79pE0A83.json" background="transparent" speed="1" style="width: 120px; height: 120px; margin: 0 auto;" loop autoplay></dotlottie-player>
        <h1>নূর-আল-কুরআন</h1>
        <p>১১৪টি সূরা তিলাওয়াত, বাংলা অর্থ ও ডিজিটাল তসবিহ</p>
    </header>

    <div class="container">

        <!-- ১. অর্থ ছাড়া ১১৪টি সূরা -->
        <div class="card-box">
            <h2 style="color: var(--deep-green)">পবিত্র কুরআনের ১১৪টি সূরা (শুধু আরবি)</h2>
            <select id="select-arabic" onchange="playArabicSurah()">
                <option value="">-- সূরা লোড হচ্ছে... --</option>
            </select>
            <div id="status-arabic" style="margin-top:10px; font-weight:bold; color:var(--gold);"></div>
            <audio id="player-arabic" controls style="width: 100%; margin-top: 15px;"></audio>
        </div>

        <!-- ২. অর্থসহ ১১৪টি সূরা -->
        <div class="card-box" style="background: #eef9f1;">
            <h2 style="color: var(--deep-green)">বাংলা অর্থসহ তিলাওয়াত (১১৪টি সূরা)</h2>
            <select id="select-bangla" onchange="playBanglaSurah()">
                <option value="">-- সূরা লোড হচ্ছে... --</option>
            </select>
            <div id="status-bangla" style="margin-top:10px; font-weight:bold; color:var(--deep-green);"></div>
            <audio id="player-bangla" controls style="width: 100%; margin-top: 15px;"></audio>
        </div>

        <!-- ৩. নির্বাচিত ১৪টি সূরা গ্রিড -->
        <h2 style="text-align: center; color: var(--deep-green); margin: 40px 0;">নির্বাচিত ছোট সূরাসমূহ</h2>
        <div id="surah-list" class="surah-grid"></div>

        <!-- ৪. ডিজিটাল তসবিহ -->
        <div class="tasbih-box">
            <h2>ডিজিটাল তসবিহ কাউন্টার</h2>
            <div id="tasbih-display">0</div>
            <button class="btn-main" style="background: white; color: var(--deep-green); width: auto; padding: 15px 40px;" onclick="addTasbih()">জিকির করুন</button>
            <br>
            <button onclick="resetTasbih()" style="background:none; border:none; color:white; cursor:pointer; margin-top:15px; text-decoration:underline;">রিসেট</button>
        </div>

        <!-- ৫. হাদিস -->
        <div class="card-box" style="margin-top: 40px; text-align: left; border-left: 10px solid var(--gold);">
            <h3 style="color: var(--deep-green)">আজকের হাদিস</h3>
            <p id="hadith-content" style="font-size: 18px; line-height: 1.8;">হাদিস লোড হচ্ছে...</p>
            <button class="btn-main" style="width: auto; padding: 10px 25px;" onclick="loadHadith()">নতুন হাদিস</button>
        </div>

    </div>

    <footer>
        <p>&copy; ২০২৪ নূর-আল-কুরআন | সাদাকায়ে জারিয়া</p>
    </footer>

    <script>
        // Firebase Config
        const firebaseConfig = { databaseURL: "https://islamic-web-demo-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const smallSurahs = [
            { id: 1, name: "Al-Fatiha", ar: "الفاتحة" },
            { id: 93, name: "Ad-Duha", ar: "الضحى" },
            { id: 94, name: "Ash-Sharh", ar: "الشرح" },
            { id: 103, name: "Al-Asr", ar: "العصر" },
            { id: 105, name: "Al-Fil", ar: "الفيل" },
            { id: 106, name: "Quraish", ar: "قরিশ" },
            { id: 107, name: "Al-Ma'un", ar: "الماعون" },
            { id: 108, name: "Al-Kauthar", ar: "الكوثر" },
            { id: 109, name: "Al-Kafirun", ar: "الكافرون" },
            { id: 110, name: "An-Nasr", ar: "النصر" },
            { id: 111, name: "Al-Masad", ar: "المسদ" },
            { id: 112, name: "Al-Ikhlas", ar: "الإخلاص" },
            { id: 113, name: "Al-Falaq", ar: "الفلق" },
            { id: 114, name: "An-Nas", ar: "الناس" }
        ];

        let currentGridId = null;
        const gridAudio = new Audio();

        // ১. ১১৪টি সূরার নাম ড্রপডাউনে লোড করা
        async function fetchSurahs() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                const selectAr = document.getElementById('select-arabic');
                const selectBn = document.getElementById('select-bangla');
                
                let options = '<option value="">-- সূরা বাছাই করুন --</option>';
                data.data.forEach(s => {
                    options += `<option value="${s.number}">${s.number}. ${s.englishName} (${s.name})</option>`;
                });
                selectAr.innerHTML = options;
                selectBn.innerHTML = options;
            } catch (e) { console.error("API Error"); }
        }

        // ২. আরবি প্লেয়ার
        function playArabicSurah() {
            const id = document.getElementById('select-arabic').value;
            const player = document.getElementById('player-arabic');
            const status = document.getElementById('status-arabic');
            if(!id) return;

            stopOthers();
            const padded = id.toString().padStart(3, '0');
            status.innerText = "অডিও লোড হচ্ছে...";
            player.src = `https://server8.mp3quran.net/afs/${padded}.mp3`;
            player.play().then(() => status.innerText = "এখন বাজছে: আরবি তিলাওয়াত");
        }

        // ৩. বাংলা অর্থসহ প্লেয়ার
        function playBanglaSurah() {
            const id = document.getElementById('select-bangla').value;
            const player = document.getElementById('player-bangla');
            const status = document.getElementById('status-bangla');
            if(!id) return;

            stopOthers();
            const padded = id.toString().padStart(3, '0');
            status.innerText = "অডিও লোড হচ্ছে...";
            player.src = `https://server13.mp3quran.net/bengali/${padded}.mp3`;
            player.play().then(() => status.innerText = "এখন বাজছে: অনুবাদসহ তিলাওয়াত");
        }

        // ৪. গ্রিড সূরা প্লে লজিক
        function toggleGridAudio(id) {
            stopOthers();
            if (currentGridId === id) {
                if (gridAudio.paused) { gridAudio.play(); updateUI(id, true); }
                else { gridAudio.pause(); updateUI(id, false); }
            } else {
                if (currentGridId) updateUI(currentGridId, false);
                currentGridId = id;
                const padded = id.toString().padStart(3, '0');
                gridAudio.src = `https://server8.mp3quran.net/afs/${padded}.mp3`;
                gridAudio.play();
                updateUI(id, true);
                db.ref('stats/' + id + '/p').transaction(c => (c || 0) + 1);
            }
        }

        function stopOthers() {
            gridAudio.pause();
            document.getElementById('player-arabic').pause();
            document.getElementById('player-bangla').pause();
            if(currentGridId) updateUI(currentGridId, false);
        }

        function updateUI(id, isPlaying) {
            const btn = document.getElementById(`btn-${id}`);
            const card = document.getElementById(`card-${id}`);
            if (btn && card) {
                btn.innerText = isPlaying ? "⏸ পজ" : "▶ প্লে করুন";
                isPlaying ? card.classList.add('playing') : card.classList.remove('playing');
            }
        }

        // ৫. ইনিট ফাংশন
        function initGrid() {
            const list = document.getElementById('surah-list');
            smallSurahs.forEach(s => {
                const card = document.createElement('div');
                card.className = 'surah-card'; card.id = `card-${s.id}`;
                card.innerHTML = `
                    <div class="arabic-text">${s.ar}</div>
                    <h3>${s.name}</h3>
                    <button class="btn-main" id="btn-${s.id}" onclick="toggleGridAudio(${s.id})">▶ প্লে করুন</button>
                    <div style="font-size:13px; margin-top:10px;">প্লে: <b id="p-${s.id}">0</b> | ❤️ <span onclick="sendLove(${s.id})" style="cursor:pointer"><b id="l-${s.id}">0</b></span></div>
                `;
                list.appendChild(card);
                db.ref('stats/' + s.id).on('value', snap => {
                    const d = snap.val() || { p: 0, l: 0 };
                    document.getElementById(`p-${s.id}`).innerText = d.p;
                    document.getElementById(`l-${s.id}`).innerText = d.l;
                });
            });
        }

        let tCount = localStorage.getItem('tasbih') || 0;
        document.getElementById('tasbih-display').innerText = tCount;
        function addTasbih() { tCount++; document.getElementById('tasbih-display').innerText = tCount; localStorage.setItem('tasbih', tCount); }
        function resetTasbih() { tCount = 0; document.getElementById('tasbih-display').innerText = 0; localStorage.setItem('tasbih', 0); }
        function sendLove(id) { db.ref('stats/' + id + '/l').transaction(c => (c || 0) + 1); }

        async function loadHadith() {
            const box = document.getElementById('hadith-content');
            box.innerText = "লোড হচ্ছে...";
            try {
                const res = await fetch('https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/ben-bukhari.json');
                const data = await res.json();
                box.innerText = data.hadiths[Math.floor(Math.random() * 500)].text;
            } catch (e) { box.innerText = "ইন্টারনেট কানেকশন চেক করুন।"; }
        }

        window.onload = () => { fetchSurahs(); initGrid(); loadHadith(); };
        gridAudio.onended = () => { if(currentGridId) updateUI(currentGridId, false); currentGridId = null; };
    </script>
</body>
</html>
