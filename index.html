<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নূর-আল-কুরআন | পূর্ণাঙ্গ ১১৪টি সূরা</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Lottie Animation -->
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --deep-green: #064e3b;
            --soft-bg: #fdfbf7;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--soft-bg);
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png'), 
                              linear-gradient(135deg, #fdfbf7 0%, #f5e6ba 100%);
            margin: 0; padding: 0;
            color: #333;
            min-height: 100vh;
        }

        .bg-animation {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.1; pointer-events: none;
        }

        header {
            background: linear-gradient(135deg, var(--deep-green), #065f46);
            color: white; text-align: center;
            padding: 50px 20px; 
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .card-box {
            background: rgba(255, 255, 255, 0.9); border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px;
            text-align: center; border: 1px solid var(--gold);
            backdrop-filter: blur(5px);
        }

        /* Search Box */
        .search-box {
            width: 100%; max-width: 500px; padding: 15px;
            border-radius: 30px; border: 2px solid var(--gold);
            font-size: 16px; margin-bottom: 30px; outline: none;
            font-family: 'Hind Siliguri';
        }

        .surah-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
        }

        .surah-card {
            background: white; border-radius: 15px; padding: 20px;
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s; border-top: 5px solid var(--gold);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .surah-card:hover { transform: translateY(-5px); }

        .arabic-text { font-family: 'Amiri', serif; font-size: 1.8rem; color: var(--deep-green); }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }

        .btn-play {
            background: var(--gold); color: white; border: none;
            padding: 10px; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 14px; flex: 1;
        }

        .btn-trans { background: var(--deep-green); }

        .playing { border: 2.5px solid var(--gold) !important; background: #fffef0 !important; }

        .tasbih-box {
            background: linear-gradient(135deg, var(--deep-green), #0a3d31);
            color: white; border-radius: 20px; padding: 40px; text-align: center; 
            border: 2px solid var(--gold); margin-top: 40px;
        }

        #tasbih-display { font-size: 4rem; font-weight: bold; color: var(--gold); }

        footer { background: #111; color: #aaa; text-align: center; padding: 30px; margin-top: 50px; }

        /* Loading Spinner */
        #loader { font-size: 20px; color: var(--deep-green); font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-animation">
        <dotlottie-player src="https://lottie.host/9707246c-c689-4b6e-8271-e7370775d788/Y679k6rP8E.json" background="transparent" speed="1" loop autoplay></dotlottie-player>
    </div>

    <header>
        <dotlottie-player src="https://lottie.host/8098670c-2646-455b-9f93-4a11b6d17730/6p79pE0A83.json" background="transparent" speed="1" style="width: 120px; height: 120px; margin: 0 auto;" loop autoplay></dotlottie-player>
        <h1>নূর-আল-কুরআন</h1>
        <p>১১৪টি সূরা: আরবি ও বাংলা অর্থসহ তিলাওয়াত</p>
    </header>

    <div class="container">

        <!-- Search Section -->
        <div style="text-align: center;">
            <input type="text" id="surahSearch" class="search-box" placeholder="সূরার নাম লিখে খুঁজুন (উদা: Fatiha বা ফাতেহা)..." onkeyup="filterSurahs()">
        </div>

        <div id="loader">সূরার তালিকা তৈরি হচ্ছে, দয়া করে অপেক্ষা করুন...</div>

        <!-- ১১৪টি সূরা গ্রিড -->
        <div id="surah-grid" class="surah-grid"></div>

        <!-- তসবিহ সেকশন -->
        <div class="tasbih-box">
            <h2>ডিজিটাল তসবিহ</h2>
            <div id="tasbih-display">0</div>
            <button onclick="addTasbih()" style="padding: 15px 40px; border-radius: 50px; border:none; background:white; color:var(--deep-green); font-weight:bold; cursor:pointer; font-size:18px;">জিকির করুন</button>
            <br>
            <button onclick="resetTasbih()" style="margin-top:20px; background:none; border:none; color:white; text-decoration:underline; cursor:pointer;">রিসেট</button>
        </div>

        <!-- হাদিস সেকশন -->
        <div class="card-box" style="margin-top: 40px; border-left: 10px solid var(--gold); text-align: left;">
            <h3 style="color: var(--deep-green);">আজকের হাদিস</h3>
            <p id="hadith-content" style="font-size: 18px; line-height: 1.8;">হাদিস লোড হচ্ছে...</p>
            <button class="btn-play" style="max-width: 150px;" onclick="loadHadith()">নতুন হাদিস</button>
        </div>

    </div>

    <footer>
        <p>&copy; ২০২৪ নূর-আল-কুরআন | সাদাকায়ে জারিয়া</p>
    </footer>

    <script>
        // Firebase (ঐচ্ছিক - কাউন্টের জন্য)
        const firebaseConfig = { databaseURL: "https://islamic-web-demo-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allSurahs = [];
        const mainAudio = new Audio();
        let currentPlayingId = null;

        // ১. API থেকে ১১৪টি সূরার তথ্য আনা
        async function fetchSurahs() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                allSurahs = data.data;
                renderSurahs(allSurahs);
                document.getElementById('loader').style.display = 'none';
            } catch (e) {
                document.getElementById('loader').innerText = "ইন্টারনেট সমস্যা। পেজটি রিফ্রেশ করুন।";
            }
        }

        // ২. সূরা কার্ড তৈরি করা
        function renderSurahs(surahs) {
            const grid = document.getElementById('surah-grid');
            grid.innerHTML = '';

            surahs.forEach(s => {
                const card = document.createElement('div');
                card.className = 'surah-card';
                card.id = `card-${s.number}`;
                card.innerHTML = `
                    <div>
                        <span style="color:var(--gold); font-weight:bold;">#${s.number}</span>
                        <div class="arabic-text">${s.name}</div>
                        <h3 style="margin:5px 0;">${s.englishName}</h3>
                        <p style="font-size:14px; color:#666;">আয়াত: ${s.numberOfAyahs} | ${s.revelationType}</p>
                    </div>
                    <div class="btn-group">
                        <button class="btn-play" onclick="playAudio(${s.number}, 'arabic')">▶ আরবি</button>
                        <button class="btn-play btn-trans" onclick="playAudio(${s.number}, 'bangla')">▶ অনুবাদ</button>
                    </div>
                    <div style="font-size:12px; margin-top:10px; color:#888;">
                        🎧 প্লে: <b id="p-${s.number}">0</b>
                    </div>
                `;
                grid.appendChild(card);

                // Firebase থেকে প্লে কাউন্ট আনা
                db.ref('stats/' + s.number).on('value', snap => {
                    const d = snap.val() || { p: 0 };
                    document.getElementById(`p-${s.number}`).innerText = d.p;
                });
            });
        }

        // ৩. অডিও প্লে লজিক (আরবি ও বাংলা)
        function playAudio(id, type) {
            if (currentPlayingId === id + type && !mainAudio.paused) {
                mainAudio.pause();
                updateUI(null);
                return;
            }

            const paddedId = id.toString().padStart(3, '0');
            let url = "";

            if (type === 'arabic') {
                url = `https://server8.mp3quran.net/afs/${paddedId}.mp3`; // Mishary Rashid
            } else {
                url = `https://server13.mp3quran.net/bengali/${paddedId}.mp3`; // Bengali Translation
            }

            mainAudio.src = url;
            mainAudio.play();
            currentPlayingId = id + type;
            updateUI(id);

            // কাউন্ট বাড়ানো
            db.ref('stats/' + id + '/p').transaction(c => (c || 0) + 1);
        }

        function updateUI(activeId) {
            document.querySelectorAll('.surah-card').forEach(c => c.classList.remove('playing'));
            if(activeId) {
                document.getElementById(`card-${activeId}`).classList.add('playing');
            }
        }

        // ৪. সার্চ ফিল্টার
        function filterSurahs() {
            const term = document.getElementById('surahSearch').value.toLowerCase();
            const filtered = allSurahs.filter(s => 
                s.englishName.toLowerCase().includes(term) || 
                s.name.includes(term) ||
                s.number.toString().includes(term)
            );
            renderSurahs(filtered);
        }

        // ৫. তসবিহ ও হাদিস
        let tCount = parseInt(localStorage.getItem('tasbih_global')) || 0;
        document.getElementById('tasbih-display').innerText = tCount;
        function addTasbih() { tCount++; document.getElementById('tasbih-display').innerText = tCount; localStorage.setItem('tasbih_global', tCount); }
        function resetTasbih() { tCount = 0; document.getElementById('tasbih-display').innerText = 0; localStorage.setItem('tasbih_global', 0); }

        async function loadHadith() {
            const box = document.getElementById('hadith-content');
            box.innerText = "লোড হচ্ছে...";
            try {
                const res = await fetch('https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/ben-bukhari.json');
                const data = await res.json();
                const rand = Math.floor(Math.random() * 1000);
                box.innerText = data.hadiths[rand].text;
            } catch (e) { box.innerText = "ইন্টারনেট কানেকশন চেক করুন।"; }
        }

        // সূচনা
        window.onload = () => {
            fetchSurahs();
            loadHadith();
        };

        mainAudio.onended = () => updateUI(null);
    </script>
</body>
</html>
