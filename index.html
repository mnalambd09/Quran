<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নূর-আল-কুরআন | পূর্ণাঙ্গ ১১৪টি সূরা</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Lottie Animation -->
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    
    <!-- Firebase SDK (For Global Stats) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --gold: #d4af37;
            --deep-green: #064e3b;
            --soft-bg: #fdfbf7;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--soft-bg);
            /* Golden Calligraphy Pattern */
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png'), 
                              linear-gradient(135deg, #fdfbf7 0%, #f5e6ba 100%);
            margin: 0; padding: 0;
            color: #333;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--deep-green), #065f46);
            color: white; text-align: center;
            padding: 40px 20px; 
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Audio Player Box */
        .player-card {
            background: white; border-radius: 20px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px;
            text-align: center; border: 2px solid var(--gold);
            position: sticky; top: 10px; z-index: 100;
        }

        .search-container { margin: 20px 0; text-align: center; }
        .search-box {
            width: 90%; max-width: 500px; padding: 12px 20px;
            border-radius: 25px; border: 2px solid var(--gold);
            font-size: 16px; outline: none; font-family: 'Hind Siliguri';
        }

        /* Grid System */
        .surah-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;
        }

        .surah-card {
            background: rgba(255, 255, 255, 0.9); border-radius: 12px; padding: 15px;
            text-align: center; border-top: 4px solid var(--gold);
            transition: 0.3s; cursor: pointer;
        }

        .surah-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .arabic-name { font-family: 'Amiri', serif; font-size: 1.8rem; color: var(--deep-green); }

        .btn-play {
            padding: 8px 15px; border: none; border-radius: 5px;
            cursor: pointer; font-weight: bold; margin: 5px; color: white;
        }
        .btn-arabic { background: var(--gold); }
        .btn-bangla { background: var(--deep-green); }

        .tasbih-section {
            background: var(--deep-green); color: white; padding: 30px;
            border-radius: 20px; text-align: center; margin-top: 40px;
            border: 2px solid var(--gold);
        }

        #tasbih-count { font-size: 3.5rem; color: var(--gold); margin: 10px 0; }

        footer { background: #111; color: #888; text-align: center; padding: 20px; margin-top: 50px; }

        .active-card { border: 2px solid var(--gold) !important; background: #fff9e6 !important; }
    </style>
</head>
<body>

    <header>
        <dotlottie-player src="https://lottie.host/8098670c-2646-455b-9f93-4a11b6d17730/6p79pE0A83.json" background="transparent" speed="1" style="width: 100px; height: 100px; margin: 0 auto;" loop autoplay></dotlottie-player>
        <h1>নূর-আল-কুরআন</h1>
        <p>পবিত্র কুরআনের ১১৪টি সূরা - আরবি ও বাংলা অনুবাদ</p>
    </header>

    <div class="container">

        <!-- ১. মেইন অডিও প্লেয়ার (Sticky) -->
        <div class="player-card">
            <h3 id="now-playing">একটি সূরা নির্বাচন করুন</h3>
            <audio id="main-audio-player" controls style="width: 100%;"></audio>
            <p id="audio-status" style="font-size: 14px; color: #666; margin-top: 10px;">অডিও লোড হতে ৩-৫ সেকেন্ড সময় লাগতে পারে</p>
        </div>

        <!-- ২. সার্চ বক্স -->
        <div class="search-container">
            <input type="text" id="surah-search" class="search-box" placeholder="সূরার নাম ইংরেজিতে বা বাংলায় লিখুন..." onkeyup="filterSurahs()">
        </div>

        <!-- ৩. সূরা গ্রিড -->
        <div id="loader" style="text-align: center; font-weight: bold; color: var(--deep-green);">সূরা তালিকা লোড হচ্ছে...</div>
        <div id="surah-grid" class="surah-grid"></div>

        <!-- ৪. ডিজিটাল তসবিহ -->
        <div class="tasbih-section">
            <h2>ডিজিটাল তসবিহ</h2>
            <div id="tasbih-count">0</div>
            <button onclick="countTasbih()" style="padding: 15px 40px; border-radius: 50px; border:none; background:var(--gold); color:white; font-size:18px; font-weight:bold; cursor:pointer;">জিকির করুন</button>
            <button onclick="resetTasbih()" style="background:none; border:none; color:white; text-decoration:underline; margin-left:15px; cursor:pointer;">রিসেট</button>
        </div>

        <!-- ৫. হাদিস বক্স -->
        <div style="background: white; padding: 25px; border-radius: 15px; margin-top: 30px; border-left: 8px solid var(--gold);">
            <h3 style="color: var(--deep-green);">আজকের হাদিস</h3>
            <p id="hadith-text" style="line-height: 1.8;">লোড হচ্ছে...</p>
            <button class="btn-play btn-arabic" onclick="fetchHadith()">নতুন হাদিস পড়ুন</button>
        </div>

    </div>

    <footer>
        <p>&copy; ২০২৪ নূর-আল-কুরআন | সাদাকায়ে জারিয়া</p>
    </footer>

    <script>
        // --- Firebase (Optional Database for Clicks) ---
        const firebaseConfig = { databaseURL: "https://islamic-web-demo-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let surahList = [];
        const audioPlayer = document.getElementById('main-audio-player');
        const nowPlayingText = document.getElementById('now-playing');
        const statusText = document.getElementById('audio-status');

        // ১. ১১৪টি সূরা API থেকে নিয়ে আসা
        async function getSurahs() {
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await res.json();
                surahList = data.data;
                displaySurahs(surahList);
                document.getElementById('loader').style.display = 'none';
            } catch (err) {
                document.getElementById('loader').innerText = "ইন্টারনেট কানেকশন চেক করুন।";
            }
        }

        // ২. গ্রিডে সূরাগুলো দেখানো
        function displaySurahs(list) {
            const grid = document.getElementById('surah-grid');
            grid.innerHTML = '';
            list.forEach(surah => {
                const card = document.createElement('div');
                card.className = 'surah-card';
                card.id = `surah-${surah.number}`;
                card.innerHTML = `
                    <div style="color: var(--gold); font-weight:bold;">#${surah.number}</div>
                    <div class="arabic-name">${surah.name}</div>
                    <h3 style="margin: 5px 0;">${surah.englishName}</h3>
                    <p style="font-size: 13px; color:#777;">আয়াত: ${surah.numberOfAyahs}</p>
                    <div style="margin-top: 10px;">
                        <button class="btn-play btn-arabic" onclick="playSurah(${surah.number}, '${surah.englishName}', 'ar')">আরবি</button>
                        <button class="btn-play btn-bangla" onclick="playSurah(${surah.number}, '${surah.englishName}', 'bn')">বাংলা অর্থ</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // ৩. অডিও প্লে করার ফাংশন
        function playSurah(id, name, lang) {
            const paddedId = id.toString().padStart(3, '0');
            let audioUrl = "";
            
            if (lang === 'ar') {
                audioUrl = `https://server8.mp3quran.net/afs/${paddedId}.mp3`;
                nowPlayingText.innerText = `এখন চলছে: ${name} (আরবি তিলাওয়াত)`;
            } else {
                audioUrl = `https://server13.mp3quran.net/bengali/${paddedId}.mp3`;
                nowPlayingText.innerText = `এখন চলছে: ${name} (বাংলা অনুবাদসহ)`;
            }

            statusText.innerText = "অডিও বাফার হচ্ছে, দয়া করে অপেক্ষা করুন...";
            audioPlayer.src = audioUrl;
            audioPlayer.play().catch(e => {
                statusText.innerText = "এই সূরার অডিও লোড হতে সমস্যা হচ্ছে।";
            });

            audioPlayer.onplaying = () => { statusText.innerText = "তিলাওয়াত চলছে..."; };

            // হাইলাইট কার্ড
            document.querySelectorAll('.surah-card').forEach(c => c.classList.remove('active-card'));
            document.getElementById(`surah-${id}`).classList.add('active-card');
            
            // Firebase Stats
            db.ref('surah_clicks/' + id).transaction(count => (count || 0) + 1);
        }

        // ৪. সার্চ ফাংশন
        function filterSurahs() {
            const query = document.getElementById('surah-search').value.toLowerCase();
            const filtered = surahList.filter(s => 
                s.englishName.toLowerCase().includes(query) || 
                s.name.includes(query) || 
                s.number.toString().includes(query)
            );
            displaySurahs(filtered);
        }

        // ৫. তসবিহ কাউন্টার
        let tCount = localStorage.getItem('my_tasbih') || 0;
        document.getElementById('tasbih-count').innerText = tCount;
        function countTasbih() {
            tCount++;
            document.getElementById('tasbih-count').innerText = tCount;
            localStorage.setItem('my_tasbih', tCount);
        }
        function resetTasbih() {
            tCount = 0;
            document.getElementById('tasbih-count').innerText = 0;
            localStorage.setItem('my_tasbih', 0);
        }

        // ৬. হাদিস ফেচ
        async function fetchHadith() {
            const hText = document.getElementById('hadith-text');
            hText.innerText = "লোড হচ্ছে...";
            try {
                const res = await fetch('https://cdn.jsdelivr.net/gh/fawazahmed0/hadith-api@1/editions/ben-bukhari.json');
                const data = await res.json();
                const random = Math.floor(Math.random() * 300);
                hText.innerText = data.hadiths[random].text;
            } catch (e) {
                hText.innerText = "হাদিস লোড করা যায়নি।";
            }
        }

        // অ্যাপ শুরু
        window.onload = () => {
            getSurahs();
            fetchHadith();
        };
    </script>
</body>
</html>
